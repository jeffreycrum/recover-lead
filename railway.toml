[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
healthcheckPath = "/api/v1/health/live"
healthcheckTimeout = 120
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "api"
internalPort = 8000

[[services]]
name = "celery-worker"
startCommand = "celery -A app.workers.celery_app worker -l info -Q default,ingestion,rag --concurrency=4"

[[services]]
name = "celery-beat"
startCommand = "celery -A app.workers.celery_app beat -l info"
