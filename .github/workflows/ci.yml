name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql+asyncpg://recoverlead_test:recoverlead_test@localhost:5433/recoverlead_test
  REDIS_URL: redis://localhost:6380/0
  ENVIRONMENT: test

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: recoverlead_test
          POSTGRES_PASSWORD: recoverlead_test
          POSTGRES_DB: recoverlead_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Smoke import (catches missing/broken deps before build)
        working-directory: backend
        run: |
          python -c "import app.main"
          python -c "import app.services.mailing.lob"
          python -c "import app.workers.celery_app"

      - name: Enable pgvector extension
        run: |
          PGPASSWORD=recoverlead_test psql -h localhost -p 5433 -U recoverlead_test -d recoverlead_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Lint
        working-directory: backend
        run: ruff check .

      - name: Type check
        working-directory: backend
        run: mypy app/ --ignore-missing-imports

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Test
        working-directory: backend
        run: pytest -v --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npx eslint src/ || true

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit || true

      - name: Test
        working-directory: frontend
        run: npm test -- --run || true
