services:
  postgres-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: recoverlead_test
      POSTGRES_PASSWORD: recoverlead_test
      POSTGRES_DB: recoverlead_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recoverlead_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
